input {
  tcp {
    port => 5044
    codec => json
  }
}

filter {
  if [type] == "django" {
    json {
      source => "message"
    }
    date {
      match => ["timestamp", "ISO8601"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "django-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}