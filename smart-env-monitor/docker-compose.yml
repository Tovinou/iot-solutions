services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_env_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-smartenv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartenv}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  web:
    image: ${WEB_IMAGE:-smart-env-monitor-web:latest}
    build: .
    labels:
      com.smart-env-monitor.component: web
      com.smart-env-monitor.deploy.slot: ${DEPLOY_SLOT:-blue}
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      DATABASE_URL: ${DATABASE_URL:-postgresql://smartenv:smartenv@db:5432/smart_env_monitor}
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@smart-env-monitor.local}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEVICE_API_KEY: ${DEVICE_API_KEY:-}
      THROTTLE_SENSOR_INGEST: ${THROTTLE_SENSOR_INGEST:-120/min}
      THROTTLE_SENSOR_READ: ${THROTTLE_SENSOR_READ:-600/min}
      SENSOR_STALE_MINUTES: ${SENSOR_STALE_MINUTES:-30}
      SENSOR_HEALTH_EMAIL_TO: ${SENSOR_HEALTH_EMAIL_TO:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - db
      - redis
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000"

  celery_worker:
    image: ${WEB_IMAGE:-smart-env-monitor-web:latest}
    build: .
    labels:
      com.smart-env-monitor.component: celery_worker
      com.smart-env-monitor.deploy.slot: ${DEPLOY_SLOT:-blue}
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      DATABASE_URL: ${DATABASE_URL:-postgresql://smartenv:smartenv@db:5432/smart_env_monitor}
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@smart-env-monitor.local}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEVICE_API_KEY: ${DEVICE_API_KEY:-}
      THROTTLE_SENSOR_INGEST: ${THROTTLE_SENSOR_INGEST:-120/min}
      THROTTLE_SENSOR_READ: ${THROTTLE_SENSOR_READ:-600/min}
      SENSOR_STALE_MINUTES: ${SENSOR_STALE_MINUTES:-30}
      SENSOR_HEALTH_EMAIL_TO: ${SENSOR_HEALTH_EMAIL_TO:-}
      SENSOR_HEALTH_CHECK_INTERVAL_SECONDS: ${SENSOR_HEALTH_CHECK_INTERVAL_SECONDS:-300}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - db
      - redis
    command: celery -A backend worker -l info

  celery_beat:
    image: ${WEB_IMAGE:-smart-env-monitor-web:latest}
    build: .
    labels:
      com.smart-env-monitor.component: celery_beat
      com.smart-env-monitor.deploy.slot: ${DEPLOY_SLOT:-blue}
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      DATABASE_URL: ${DATABASE_URL:-postgresql://smartenv:smartenv@db:5432/smart_env_monitor}
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@smart-env-monitor.local}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEVICE_API_KEY: ${DEVICE_API_KEY:-}
      THROTTLE_SENSOR_INGEST: ${THROTTLE_SENSOR_INGEST:-120/min}
      THROTTLE_SENSOR_READ: ${THROTTLE_SENSOR_READ:-600/min}
      SENSOR_STALE_MINUTES: ${SENSOR_STALE_MINUTES:-30}
      SENSOR_HEALTH_EMAIL_TO: ${SENSOR_HEALTH_EMAIL_TO:-}
      SENSOR_HEALTH_CHECK_INTERVAL_SECONDS: ${SENSOR_HEALTH_CHECK_INTERVAL_SECONDS:-300}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - db
      - redis
    command: celery -A backend beat -l info

  celery:
    image: ${WEB_IMAGE:-smart-env-monitor-web:latest}
    build: .
    labels:
      com.smart-env-monitor.component: celery
      com.smart-env-monitor.deploy.slot: ${DEPLOY_SLOT:-blue}
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      DATABASE_URL: ${DATABASE_URL:-postgresql://smartenv:smartenv@db:5432/smart_env_monitor}
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@smart-env-monitor.local}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEVICE_API_KEY: ${DEVICE_API_KEY:-}
      THROTTLE_SENSOR_INGEST: ${THROTTLE_SENSOR_INGEST:-120/min}
      THROTTLE_SENSOR_READ: ${THROTTLE_SENSOR_READ:-600/min}
      SENSOR_STALE_MINUTES: ${SENSOR_STALE_MINUTES:-30}
      SENSOR_HEALTH_EMAIL_TO: ${SENSOR_HEALTH_EMAIL_TO:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - db
      - redis
    command: celery -A backend worker --loglevel=info --queues=default,notifications

  proxy:
    image: caddy:2-alpine
    labels:
      com.smart-env-monitor.component: proxy
      com.smart-env-monitor.deploy.slot: ${DEPLOY_SLOT:-blue}
    ports:
      - "127.0.0.1:${PROXY_HTTP_PORT:-18080}:80"
      - "127.0.0.1:${PROXY_HTTPS_PORT:-18443}:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - smart-env-monitor

  logstash:
    image: logstash:8.11.0
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch
    networks:
      - smart-env-monitor

  kibana:
    image: kibana:8.11.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - smart-env-monitor

  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - web
    networks:
      - smart-env-monitor

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - smart-env-monitor

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - smart-env-monitor

  locust:
    image: locustio/locust:latest
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host=http://kong:8000
    depends_on:
      - kong
    networks:
      - smart-env-monitor

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  elasticsearch_data:

networks:
  smart-env-monitor:
    driver: bridge
