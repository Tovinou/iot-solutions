apiVersion: v1
kind: Namespace
metadata:
  name: smart-env-monitor
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: smart-env-monitor
data:
  DEBUG: "False"
  ALLOWED_HOSTS: "localhost,127.0.0.1"
  CSRF_TRUSTED_ORIGINS: ""
  SECURE_SSL_REDIRECT: "False"
  THROTTLE_SENSOR_INGEST: "120/min"
  THROTTLE_SENSOR_READ: "600/min"
  SENSOR_STALE_MINUTES: "30"
  SENSOR_HEALTH_CHECK_INTERVAL_SECONDS: "300"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/0"
  DATABASE_URL: "postgresql://smartenv:smartenv@postgres:5432/smart_env_monitor"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: smart-env-monitor
type: Opaque
stringData:
  SECRET_KEY: "change-me"
  DEVICE_API_KEY: ""
  POSTGRES_PASSWORD: "smartenv"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: smart-env-monitor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: smart-env-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: smart_env_monitor
            - name: POSTGRES_USER
              value: smartenv
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: smart-env-monitor
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: smart-env-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: smart-env-monitor
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: smart-env-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: smart-env-monitor-web:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          ports:
            - containerPort: 8000
          command: ["sh", "-c"]
          args:
            - "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn backend.wsgi:application --bind 0.0.0.0:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: smart-env-monitor
spec:
  selector:
    app: web
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: smart-env-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: smart-env-monitor-web:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          command: ["celery", "-A", "backend", "worker", "-l", "info"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: smart-env-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: smart-env-monitor-web:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          command: ["celery", "-A", "backend", "beat", "-l", "info"]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: smart-env-monitor
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 8000
