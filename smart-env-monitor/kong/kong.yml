_format_version: "3.0"

services:
  - name: smart-env-monitor-web
    url: http://web:8000
    routes:
      - name: api
        paths:
          - /api/
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 600
              policy: local
          - name: oauth2
            config:
              scopes: ["read", "write"]
              mandatory_scope: true
              enable_authorization_code: true
              token_expiration: 7200
              refresh_token_ttl: 604800
          - name: cors
            config:
              origins:
                - "*"
              methods:
                - GET
                - POST
                - PUT
                - DELETE
                - OPTIONS
              headers:
                - Accept
                - Accept-Version
                - Content-Length
                - Content-MD5
                - Content-Type
                - Date
                - X-Auth-Token
                - Authorization
              credentials: true
      - name: dashboard
        paths:
          - /dashboard/
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              policy: local
      - name: swagger
        paths:
          - /swagger/
        strip_path: false
