apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "smart-env-monitor.fullname" . }}-postgres-data
  labels:
    {{- include "smart-env-monitor.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smart-env-monitor.fullname" . }}-postgres
  labels:
    {{- include "smart-env-monitor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "smart-env-monitor.name" . }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "smart-env-monitor.labels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "smart-env-monitor.fullname" . }}-secret
                  key: POSTGRES_PASSWORD
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "smart-env-monitor.fullname" . }}-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "smart-env-monitor.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "smart-env-monitor.name" . }}
    app.kubernetes.io/component: postgres
  ports:
    - port: 5432
      targetPort: postgres
