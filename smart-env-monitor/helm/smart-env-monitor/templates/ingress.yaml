{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "smart-env-monitor.fullname" . }}-web
  labels:
    {{- include "smart-env-monitor.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - {{- if .Values.ingress.host }}host: {{ .Values.ingress.host | quote }}{{- end }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "smart-env-monitor.fullname" . }}-web
                port:
                  number: {{ .Values.service.port }}
{{- end -}}
