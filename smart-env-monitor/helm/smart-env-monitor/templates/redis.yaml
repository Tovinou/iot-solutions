apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smart-env-monitor.fullname" . }}-redis
  labels:
    {{- include "smart-env-monitor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "smart-env-monitor.name" . }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "smart-env-monitor.labels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - name: redis
              containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    {{- include "smart-env-monitor.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "smart-env-monitor.name" . }}
    app.kubernetes.io/component: redis
  ports:
    - port: 6379
      targetPort: redis
