[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    e2e: End-to-end tests that require full system
    integration: Integration tests
    slow: Slow-running tests
    sensor: Tests related to sensor data
    dashboard: Tests related to dashboard functionality
    alerts: Tests related to alert system
    monitoring: Tests related to ELK monitoring
    incidents: Tests related to incident reporting

# Configuration
addopts =
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    -v

# Filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Django settings
DJANGO_SETTINGS_MODULE = backend.settings

# Test execution
# Uncomment to run tests in parallel (requires pytest-xdist)
# addopts = -n auto
